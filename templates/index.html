<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interview Question Generator</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <main class="card">
      <header>
        <h1>Interview Question Generator</h1>
        <p>
          Enter a job title and get 3 role-specific interview questions generated by Google Gemini.
        </p>
      </header>

      <form id="jobForm" novalidate>
        <label for="jobTitle">Job Title</label>
        <input
          id="jobTitle"
          name="jobTitle"
          type="text"
          placeholder="e.g. Customer Success Manager"
          autocomplete="off"
        />

        <div class="row">
          <button id="submitBtn" type="submit">Generate Questions</button>
        </div>

        <div id="inlineError" class="error" role="alert" aria-live="polite"></div>

        <div id="loaderRow" class="loader-row" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <div>Generating questions...</div>
        </div>
      </form>

      <section id="results" class="results" aria-live="polite">
        <h2 style="margin: 16px 0 0; font-size: 1.15rem">Questions</h2>
        <ol id="questionsList" class="questions"></ol>
      </section>
    </main>

    <script src="/static/js/script.js"></script>
  </body>
</html>
